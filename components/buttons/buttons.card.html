<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 28px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 48px; padding: 0 22px; font-family: var(--font-sans); font-size: 16px; font-weight: 600; letter-spacing: -0.01em; border-radius: 999px; border: none; cursor: pointer; }
  .primary { background: var(--brand-primary); color: #fff; box-shadow: var(--shadow-brand-soft); }
  .dark { background: var(--neutral-900); color: var(--green-400); }
  .soft { background: var(--surface-mint-strong); color: var(--text-brand); }
  .ghost { background: transparent; color: var(--text-brand); border: 1.5px dashed var(--border-dashed); }
  .sm { height: 36px; padding: 0 16px; font-size: 14px; }
  .lg { height: 56px; padding: 0 28px; font-size: 18px; }
  .disabled { opacity: .45; }
  .ic { width: 44px; height: 44px; border-radius: 999px; border: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .ic.mint { background: var(--surface-mint); color: var(--brand-primary); }
  .ic.neutral { background: var(--neutral-100); color: var(--text-secondary); }
  .ic img { width: 22px; height: 22px; }
  .lbl { font-size: 11px; color: var(--text-tertiary); width: 64px; }
</style>
</head>

    <button class="btn primary">시작하기</button>
    <button class="btn dark">끄기</button>
    <button class="btn soft">미루기</button>
    <button class="btn ghost">+ 루틴 공유</button>
    <button class="btn primary disabled">완료됨</button>
  </div>
  <div class="row"><span class="lbl">sizes</span>
    <button class="btn primary sm">함께하기</button>
    <button class="btn primary">함께하기</button>
