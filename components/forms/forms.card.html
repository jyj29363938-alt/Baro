<!-- @dsCard group="Components" viewport="700x190" name="Day chips & toggles" subtitle="Weekly tracker states + settings switches" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 28px; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .lbl { font-size: 11px; color: var(--text-tertiary); width: 70px; }
  .chip { width: 44px; height: 44px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .filled { background: var(--brand-primary); color: #fff; box-shadow: var(--shadow-brand-soft); }
  .selected { background: var(--surface-mint); color: var(--brand-primary); border: 1.5px solid var(--green-200); }
  .outline { color: var(--brand-primary); border: 1.5px dashed var(--border-dashed); }
  .inactive { background: var(--neutral-100); color: var(--text-tertiary); }
  .sw { position: relative; width: 48px; height: 28px; border-radius: 999px; }
  .sw.on { background: linear-gradient(90deg, var(--green-300), var(--brand-primary)); box-shadow: var(--shadow-brand-soft); }
  .sw.off { background: var(--neutral-300); }
  .thumb { position: absolute; top: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .sw.on .thumb { right: 3px; }
  .sw.off .thumb { left: 3px; }
  .gap { display: flex; gap: 16px; align-items: center; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">day chips</span>
    <span class="chip filled">월</span>
    <span class="chip selected">화</span>
    <span class="chip outline">수</span>
    <span class="chip outline">목</span>
    <span class="chip inactive">토</span>
    <span class="chip inactive">일</span>
  </div>
  <div class="row"><span class="lbl">toggle</span>
    <div class="gap">
      <div class="sw on"><span class="thumb"></span></div>
      <div class="sw off"><span class="thumb"></span></div>
    </div>
  </div>
</body>
</html>
