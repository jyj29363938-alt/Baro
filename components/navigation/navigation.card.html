<!DOCTYPE html>

<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); padding: 24px; }
  .label { font-size: 11px; color: var(--text-tertiary); margin: 0 0 10px; }
  .bars { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; max-width: 420px; }
  .bar { display: flex; gap: 8px; }
  .seg { flex: 1; height: 12px; border-radius: 999px; background: var(--green-100); }
  .seg.f { background: var(--brand-primary); box-shadow: var(--shadow-brand-soft); }
  .nav { display: flex; background: #fff; border-radius: 18px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm); overflow: hidden; max-width: 420px; }
  .tab { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 0; color: var(--text-tertiary); }
  .tab.active { color: var(--brand-primary); }
  .tab .ind { position: absolute; top: 0; width: 38px; height: 3px; border-radius: 0 0 3px 3px; background: var(--brand-primary); }
  .tab .gi { display: block; }
  .tab span { font-size: 10px; font-weight: 600; }
</style>
