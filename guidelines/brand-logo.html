<!-- @dsCard group="Brand" viewport="700x220" name="Logo & mascot" subtitle="Baro the turtle — wordmark + mark on light and dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 28px; }
  .row { display: flex; gap: 20px; align-items: stretch; }
  .panel { flex: 1; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 28px; }
  .light { background: var(--surface-mint); }
  .dark { background: var(--neutral-900); }
  .lock { display: flex; align-items: center; gap: 12px; }
  .word { font-size: 38px; font-weight: 700; letter-spacing: -0.03em; }
  .marks { display: flex; align-items: flex-end; gap: 18px; }
  .cap { font-size: 10px; color: var(--text-secondary); text-align: center; margin-top: 8px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="panel light">
      <div class="lock">

          <circle cx="4.6" cy="7" r="1.0" fill="#1a1a1a"></circle>

    </div>

</html>
