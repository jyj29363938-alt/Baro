<!-- @dsCard group="Colors" viewport="700x180" name="Brand green scale" subtitle="9-step green ramp — 500 is primary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); }
  .row { display: flex; padding: 24px; gap: 0; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 72px; border-radius: 12px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04); }
  .meta { display: flex; flex-direction: column; gap: 1px; padding: 0 2px; }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .star { font-size: 10px; color: var(--text-brand); font-weight: 700; }
  .sw + .sw { margin-left: 8px; }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const steps = [
      ["50", "#EBFFF5"], ["100", "#D6FFE9"], ["200", "#B6FFD4"], ["300", "#7EFAB7"],
      ["400", "#3AE9A1"], ["500", "#00C776", "primary"], ["600", "#00AF67"],
      ["700", "#04975E"], ["800", "#03794E"]
    ];
    document.getElementById("row").innerHTML = steps.map(([n, hex, tag]) => `
      <div class="sw">
        <div class="chip" style="background:${hex}"></div>
        <div class="meta">
          <span class="name">green-${n}</span>
          <span class="hex">${hex}</span>
          ${tag ? `<span class="star">★ ${tag}</span>` : ""}
        </div>
      </div>`).join("");
  </script>
</body>
</html>
