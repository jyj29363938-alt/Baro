<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals (cool gray)" subtitle="Page, borders, and the full text-gray ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); }
  .row { display: flex; padding: 24px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .sw + .sw { margin-left: 8px; }
  .chip { height: 64px; border-radius: 12px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .name { font-size: 11px; font-weight: 600; }
  .hex { font-size: 10px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const steps = [
      ["0","#FFFFFF"],["50","#FAFAFA"],["100","#EFEFEF"],["200","#DCDCDC"],
      ["400","#BDBDBD"],["500","#989898"],["600","#656565"],["700","#464646"],["900","#292929"]
    ];
    document.getElementById("row").innerHTML = steps.map(([n,hex]) => `
      <div class="sw">
        <div class="chip" style="background:${hex}"></div>
        <span class="name">neutral-${n}</span>
        <span class="hex">${hex}</span>
      </div>`).join("");
  </script>
</body>
</html>
