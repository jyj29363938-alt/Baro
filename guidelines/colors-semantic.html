<!-- @dsCard group="Colors" viewport="700x210" name="Semantic & accents" subtitle="Brand roles, text, surfaces, and warm streak accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 24px; }
  h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tok { display: flex; align-items: center; gap: 10px; }
  .dot { width: 32px; height: 32px; border-radius: 8px; flex: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .lbl { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .lbl b { font-size: 11.5px; font-weight: 600; }
  .lbl span { font-size: 10px; color: var(--text-secondary); }
  section + section { margin-top: 18px; }
</style>
</head>
<body>
  <section>
    <h4>Brand & accent</h4>
    <div class="grid">
      <div class="tok"><div class="dot" style="background:var(--brand-primary)"></div><div class="lbl"><b>primary</b><span>green-500</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--brand-primary-hover)"></div><div class="lbl"><b>primary-hover</b><span>green-600</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--accent-streak)"></div><div class="lbl"><b>streak</b><span>amber-500</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--accent-warm)"></div><div class="lbl"><b>warm</b><span>amber-300</span></div></div>
    </div>
  </section>
  <section>
    <h4>Surfaces & text</h4>
    <div class="grid">
      <div class="tok"><div class="dot" style="background:var(--surface-page)"></div><div class="lbl"><b>page</b><span>neutral-50</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--surface-mint)"></div><div class="lbl"><b>mint</b><span>green-50</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--text-primary)"></div><div class="lbl"><b>text</b><span>neutral-900</span></div></div>
      <div class="tok"><div class="dot" style="background:var(--text-secondary)"></div><div class="lbl"><b>text-2nd</b><span>neutral-600</span></div></div>
    </div>
  </section>
</body>
</html>
