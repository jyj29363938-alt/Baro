<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radius" subtitle="Soft everywhere — pills for buttons, 20–32 for cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 24px; }
  .row { display: flex; gap: 16px; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 100%; height: 72px; background: var(--surface-mint); box-shadow: inset 0 0 0 1.5px var(--green-400); }
  .name { font-size: 11px; font-weight: 600; }
  .val { font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const steps = [["xs","8px"],["sm","12px"],["md","16px"],["lg","20px"],["xl","24px"],["2xl","32px"],["pill","999px"]];
    document.getElementById("row").innerHTML = steps.map(([n,v]) => `
      <div class="item">
        <div class="box" style="border-radius:${v}"></div>
        <span class="name">${n}</span>
        <span class="val">${v}</span>
      </div>`).join("");
  </script>
</body>
</html>
