<!-- @dsCard group="Type" viewport="700x230" name="Pretendard — weights" subtitle="Korean-first geometric sans, 6 active weights" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: 28px; }
  .specimen { font-size: 44px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .weights { display: flex; flex-direction: column; gap: 6px; margin-top: 20px; }
  .w { display: flex; align-items: baseline; gap: 16px; }
  .w .num { width: 132px; font-size: 12px; color: var(--text-tertiary); }
  .w .sample { font-size: 20px; }
</style>
</head>
<body>
  <div class="specimen">바로 자세를 바르게</div>
  <div class="sub">Pretendard · Aa Bb Cc · 0123456789 · 가나다라마바사</div>
  <div class="weights">
    <div class="w"><span class="num">300 Light</span><span class="sample" style="font-weight:300">오늘도 자세를 바르게</span></div>
    <div class="w"><span class="num">400 Regular</span><span class="sample" style="font-weight:400">오늘도 자세를 바르게</span></div>
    <div class="w"><span class="num">500 Medium</span><span class="sample" style="font-weight:500">오늘도 자세를 바르게</span></div>
    <div class="w"><span class="num">600 SemiBold ★</span><span class="sample" style="font-weight:600">오늘도 자세를 바르게</span></div>
    <div class="w"><span class="num">700 Bold</span><span class="sample" style="font-weight:700">오늘도 자세를 바르게</span></div>
  </div>
</body>
</html>
